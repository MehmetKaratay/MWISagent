rules:
  - id: detect-hardcoded-google-api-key
    patterns:
      - pattern-regex: "AIzaSy[A-Za-z0-9_\\-]*"
    message: "Security Warning: A hardcoded Google API Key was detected. Please load credentials dynamically from environment variables or a secure secret manager."
    languages:
      - python
    severity: ERROR

  - id: detect-insecure-subprocess-shell
    patterns:
      - pattern-either:
          - pattern: subprocess.run(..., shell=True, ...)
          - pattern: subprocess.Popen(..., shell=True, ...)
          - pattern: subprocess.call(..., shell=True, ...)
          - pattern: os.system(...)
    message: "Security Warning: Insecure shell execution detected (shell=True). Use direct argument arrays in subprocess execution to prevent command injection."
    languages:
      - python
    severity: ERROR

  - id: detect-insecure-ssl-bypass
    patterns:
      - pattern-either:
          - pattern: requests.get(..., verify=False, ...)
          - pattern: requests.post(..., verify=False, ...)
          - pattern: requests.request(..., verify=False, ...)
    message: "Security Warning: SSL verification is disabled (verify=False). This exposes requests to Man-in-the-Middle (MitM) attacks."
    languages:
      - python
    severity: ERROR

  - id: detect-pydantic-validation-bypass
    patterns:
      - pattern-either:
          - pattern: $X = sys.argv[...]
          - pattern: $X = args.$Y
      - pattern-not: validate_region_query(...)
      - pattern-not: validate_date_query(...)
    message: "Security Warning: CLI inputs are being processed without validation schemas."
    languages:
      - python
    severity: WARNING

  - id: detect-hardcoded-secret-assignment
    patterns:
      - pattern-either:
          - pattern: $PASSWORD = "..."
          - pattern: $SECRET = "..."
          - pattern: $API_KEY = "..."
          - pattern: $TOKEN = "..."
      - metavariable-regex:
          metavariable: $PASSWORD
          regex: (?i)(password|secret|api_key|token|auth)
    message: "Security Warning: Hardcoded secret detected in assignment. Always load credentials dynamically from environment variables."
    languages:
      - python
    severity: WARNING

  - id: detect-insecure-temp-file
    pattern: tempfile.mktemp(...)
    message: "Security Warning: tempfile.mktemp is deprecated and insecure. Use tempfile.TemporaryDirectory or tempfile.NamedTemporaryFile instead."
    languages:
      - python
    severity: ERROR

  - id: detect-insecure-xml-parsing
    patterns:
      - pattern-either:
          - pattern: import xml.etree.ElementTree
          - pattern: import xml.dom.minidom
          - pattern: import lxml
    message: "Security Warning: Standard XML parsers are vulnerable to XXE. Use defusedxml instead."
    languages:
      - python
    severity: ERROR

  - id: detect-assert-in-production
    patterns:
      - pattern: assert ...
      - pattern-not-inside: |
          def test_$FUNC(...):
              ...
      - pattern-not-inside: |
          class Test$CLASS(...):
              ...
    message: "Security Warning: Assert statements are removed in optimized execution mode. Use explicit conditional checks for security validation."
    languages:
      - python
    severity: WARNING

  - id: detect-log-injection
    patterns:
      - pattern-either:
          - pattern: print(..., $INPUT, ...)
          - pattern: sys.stdout.write(..., $INPUT, ...)
          - pattern: sys.stderr.write(..., $INPUT, ...)
      - metavariable-regex:
          metavariable: $INPUT
          regex: (?i)(query|args|input|text|content|body)
    message: "Security Warning: Potential log injection. Unescaped inputs printed or logged directly."
    languages:
      - python
    severity: WARNING

  - id: detect-sql-injection
    patterns:
      - pattern-either:
          - pattern: $DB.execute(f"...")
          - pattern: $DB.execute("..." % ...)
          - pattern: $DB.execute("...".format(...))
      - metavariable-regex:
          metavariable: $DB
          regex: (?i)(db|conn|cursor|session|execute)
    message: "Security Warning: Constructing raw SQL query via string interpolation. Use parameterized queries instead."
    languages:
      - python
    severity: ERROR
